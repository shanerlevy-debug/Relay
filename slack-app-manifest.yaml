display_information:
  name: Relay
  description: Multi-agent Claude bridge
  background_color: "#1a1a1a"

features:
  bot_user:
    display_name: Relay
    always_online: true

  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

  slash_commands:
    - command: /ask
      description: Ask one of the agents
      usage_hint: "<agent-slug> <message>"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.public
      - channels:history
      - im:history
      - im:write
      - commands

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.im

  interactivity:
    is_enabled: true

  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
